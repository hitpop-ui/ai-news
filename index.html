<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI News Digest</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ---- パスワード画面 ---- */
    #lock-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .lock-card {
      background: #fff;
      border-radius: 12px;
      border: 0.5px solid rgba(0,0,0,0.12);
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .lock-icon {
      font-size: 32px;
      margin-bottom: 1rem;
    }
    .lock-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .lock-subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 1.5rem;
    }
    .lock-card input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.2);
      background: #fafaf8;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      margin-bottom: 10px;
    }
    .lock-card input[type="password"]:focus {
      border-color: rgba(0,0,0,0.4);
    }
    .lock-btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }
    .lock-btn:hover { background: #333; }
    .lock-error {
      font-size: 13px;
      color: #c0392b;
      margin-top: 8px;
      display: none;
    }

    /* ---- メイン画面 ---- */
    #main-screen { display: none; }
    .header {
      background: #fff;
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title { font-size: 16px; font-weight: 500; }
    .header-sub { font-size: 12px; color: #888; }
    .lock-out-btn {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 0.5px solid rgba(0,0,0,0.2);
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      color: #888;
    }
    .lock-out-btn:hover { background: #f0efe9; }
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .file-item {
      background: #fff;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.12);
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      transition: background 0.1s;
    }
    .file-item:hover { background: #fafaf8; }
    .file-item.active {
      border-color: rgba(0,0,0,0.3);
      background: #fafaf8;
    }
    .file-date { font-weight: 500; }
    .file-arrow { color: #aaa; font-size: 12px; }
    .content-card {
      background: #fff;
      border-radius: 12px;
      border: 0.5px solid rgba(0,0,0,0.12);
      padding: 1.5rem;
    }
    .content-body {
      font-size: 15px;
      line-height: 1.8;
      color: #1a1a1a;
    }
    .content-body h1 { font-size: 20px; font-weight: 500; margin: 1.5rem 0 0.75rem; }
    .content-body h2 { font-size: 17px; font-weight: 500; margin: 1.25rem 0 0.5rem; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding-bottom: 4px; }
    .content-body h3 { font-size: 15px; font-weight: 500; margin: 1rem 0 0.4rem; }
    .content-body p { margin-bottom: 0.75rem; }
    .content-body ul, .content-body ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .content-body li { margin-bottom: 4px; }
    .content-body a { color: #185FA5; }
    .content-body code { background: #f0efe9; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .content-body pre { background: #f0efe9; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 0.75rem; }
    .content-body pre code { background: none; padding: 0; }
    .loading { font-size: 14px; color: #888; padding: 2rem 0; text-align: center; }
    .empty { font-size: 14px; color: #888; text-align: center; padding: 3rem 0; }
  </style>
</head>
<body>

  <!-- パスワード画面 -->
  <div id="lock-screen">
    <div class="lock-card">
      <div class="lock-icon">🔒</div>
      <div class="lock-title">AI News Digest</div>
      <div class="lock-subtitle">パスワードを入力してください</div>
      <input type="password" id="password-input" placeholder="パスワード" onkeydown="if(event.key==='Enter')unlock()" />
      <button class="lock-btn" onclick="unlock()">ログイン</button>
      <div class="lock-error" id="lock-error">パスワードが違います</div>
    </div>
  </div>

  <!-- メイン画面 -->
  <div id="main-screen">
    <div class="header">
      <div>
        <div class="header-title">AI News Digest</div>
        <div class="header-sub">自動収集ダイジェスト</div>
      </div>
      <button class="lock-out-btn" onclick="lockOut()">ロック</button>
    </div>
    <div class="container">
      <div class="file-list" id="file-list">
        <div class="loading">読み込み中...</div>
      </div>
      <div class="content-card" id="content-card" style="display:none;">
        <div class="content-body" id="content-body"></div>
      </div>
      <div class="empty" id="empty-msg" style="display:none;">ダイジェストがまだありません</div>
    </div>
  </div>

<script>
  // =============================
  // ★ここでパスワードを設定してね★
  // =============================
  const PASSWORD = 'haruto2026';
  // =============================

  const SESSION_KEY = 'ai_news_unlocked';

  function unlock() {
    const input = document.getElementById('password-input').value;
    if (input === PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, '1');
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'block';
      loadFiles();
    } else {
      document.getElementById('lock-error').style.display = 'block';
      document.getElementById('password-input').value = '';
      document.getElementById('password-input').focus();
    }
  }

  function lockOut() {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('lock-screen').style.display = 'flex';
    document.getElementById('password-input').value = '';
  }

  async function loadFiles() {
    try {
      const res = await fetch('files.json?t=' + Date.now());
      const files = await res.json();
      const list = document.getElementById('file-list');

      if (!files || files.length === 0) {
        list.innerHTML = '';
        document.getElementById('empty-msg').style.display = 'block';
        return;
      }

      list.innerHTML = files.map((f, i) => {
        const date = f.replace(/.*ai-news-/, '').replace('.md', '');
        return `<div class="file-item ${i === 0 ? 'active' : ''}" onclick="loadContent('${f}', this)">`
          + `<span class="file-date">${date}</span>`
          + `<span class="file-arrow">▶</span>`
          + `</div>`;
      }).join('');

      loadContent(files[0], list.querySelector('.file-item'));
    } catch(e) {
      document.getElementById('file-list').innerHTML = '<div class="loading">ファイル一覧の読み込みに失敗しました</div>';
    }
  }

  async function loadContent(path, el) {
    document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    const card = document.getElementById('content-card');
    const body = document.getElementById('content-body');
    card.style.display = 'block';
    body.innerHTML = '<div class="loading">読み込み中...</div>';

    try {
      const res = await fetch(path + '?t=' + Date.now());
      const text = await res.text();
      body.innerHTML = marked.parse(text);
    } catch(e) {
      body.innerHTML = '<div class="loading">読み込みに失敗しました</div>';
    }
  }

  // セッション確認（リロード時に再入力不要）
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    loadFiles();
  }
</script>
</body>
</html>
